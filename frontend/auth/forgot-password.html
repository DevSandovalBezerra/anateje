<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - ANATEJE</title>
    <link rel="icon" href="../../assets/images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../../assets/css/main-compiled.css">
    <link rel="stylesheet" href="../../assets/css/tokens.css">
    <link rel="stylesheet" href="../../assets/css/colors.css">
    <link rel="stylesheet" href="../../assets/css/themes.css">
    <script src="../../assets/vendor/lucide/lucide.min.js"></script>
    <script src="../../assets/js/api-config.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background: var(--an-grad-hero);">
    <div class="w-full max-w-md rounded-2xl shadow-2xl p-8" style="background: rgba(29, 21, 16, 0.95); border: 1px solid var(--border-primary);">
        <div class="text-center mb-6">
            <img src="../../assets/images/logo.png" alt="Logo ANATEJE" class="w-16 h-16 rounded-full mx-auto mb-4 border border-white/20">
            <h1 class="text-2xl font-bold" style="font-family: var(--an-font-heading); color: var(--text-primary);">Recuperar senha</h1>
            <p class="text-sm mt-2" style="color: var(--text-secondary);">Informe seu email para solicitar redefinicao.</p>
        </div>

        <form id="forgotForm" class="space-y-4" novalidate>
            <div>
                <label for="email" class="block text-sm font-medium mb-2" style="color: var(--text-primary);">Email</label>
                <input id="email" type="email" class="input-primary w-full" placeholder="seu@email.com" required>
            </div>
            <button id="submitBtn" type="submit" class="btn-primary w-full">Solicitar recuperacao</button>
        </form>

        <p id="msg" class="text-sm mt-4"></p>
        <p id="debugLink" class="text-xs mt-2 break-all"></p>

        <div class="mt-6 text-center">
            <a href="./login.html" class="text-sm" style="color: var(--text-secondary);">Voltar ao login</a>
        </div>
    </div>

    <script>
        (function () {
            if (window.lucide && typeof window.lucide.createIcons === 'function') {
                window.lucide.createIcons();
            }

            const form = document.getElementById('forgotForm');
            const msg = document.getElementById('msg');
            const debugLink = document.getElementById('debugLink');
            const submitBtn = document.getElementById('submitBtn');

            function setMessage(text, type) {
                msg.textContent = text || '';
                msg.style.color = type === 'ok' ? '#82d59f' : '#ff9d9d';
            }

            form.addEventListener('submit', async function (event) {
                event.preventDefault();
                setMessage('', 'ok');
                debugLink.textContent = '';
                submitBtn.disabled = true;

                try {
                    const email = document.getElementById('email').value.trim();
                    const formData = new URLSearchParams();
                    formData.append('action', 'request_password_reset');
                    formData.append('email', email);

                    const response = await fetch(getApiUrl('auth/login.php'), {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formData.toString()
                    });

                    const json = await response.json().catch(function () { return null; });
                    if (!json || json.success !== true) {
                        throw new Error((json && json.message) || 'Falha ao solicitar recuperacao');
                    }

                    setMessage(json.message || 'Solicitacao enviada.', 'ok');
                    if (json.debug_reset_url) {
                        debugLink.innerHTML = 'Ambiente local: <a href="' + json.debug_reset_url + '" style="color:#f4d4b2;text-decoration:underline;">' + json.debug_reset_url + '</a>';
                    }
                } catch (err) {
                    setMessage(err.message || 'Falha ao solicitar recuperacao.', 'err');
                } finally {
                    submitBtn.disabled = false;
                }
            });
        })();
    </script>
</body>
</html>
