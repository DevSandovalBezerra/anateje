<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - ANATEJE</title>
    <link rel="icon" href="../../assets/images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../../assets/css/main-compiled.css">
    <link rel="stylesheet" href="../../assets/css/tokens.css">
    <link rel="stylesheet" href="../../assets/css/colors.css">
    <link rel="stylesheet" href="../../assets/css/themes.css">
    <script src="../../assets/vendor/lucide/lucide.min.js"></script>
    <script src="../../assets/js/api-config.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background: var(--an-grad-hero);">
    <div class="w-full max-w-md rounded-2xl shadow-2xl p-8" style="background: rgba(29, 21, 16, 0.95); border: 1px solid var(--border-primary);">
        <div class="text-center mb-6">
            <img src="../../assets/images/logo.png" alt="Logo ANATEJE" class="w-16 h-16 rounded-full mx-auto mb-4 border border-white/20">
            <h1 class="text-2xl font-bold" style="font-family: var(--an-font-heading); color: var(--text-primary);">Redefinir senha</h1>
            <p class="text-sm mt-2" style="color: var(--text-secondary);">Informe sua nova senha.</p>
        </div>

        <form id="resetForm" class="space-y-4" novalidate>
            <div>
                <label for="newPassword" class="block text-sm font-medium mb-2" style="color: var(--text-primary);">Nova senha</label>
                <input id="newPassword" type="password" class="input-primary w-full" minlength="6" required>
            </div>
            <div>
                <label for="confirmPassword" class="block text-sm font-medium mb-2" style="color: var(--text-primary);">Confirmar senha</label>
                <input id="confirmPassword" type="password" class="input-primary w-full" minlength="6" required>
            </div>
            <button id="submitBtn" type="submit" class="btn-primary w-full">Salvar nova senha</button>
        </form>

        <p id="msg" class="text-sm mt-4"></p>
        <div class="mt-6 text-center">
            <a href="./login.html" class="text-sm" style="color: var(--text-secondary);">Voltar ao login</a>
        </div>
    </div>

    <script>
        (function () {
            if (window.lucide && typeof window.lucide.createIcons === 'function') {
                window.lucide.createIcons();
            }

            const form = document.getElementById('resetForm');
            const msg = document.getElementById('msg');
            const submitBtn = document.getElementById('submitBtn');
            const token = new URLSearchParams(window.location.search).get('token') || '';

            function setMessage(text, type) {
                msg.textContent = text || '';
                msg.style.color = type === 'ok' ? '#82d59f' : '#ff9d9d';
            }

            async function validateToken() {
                if (!token) {
                    setMessage('Token ausente. Solicite nova recuperacao de senha.', 'err');
                    form.querySelectorAll('input,button').forEach(function (el) { el.disabled = true; });
                    return;
                }

                try {
                    const response = await fetch(getApiUrl('auth/login.php?action=validate_reset_token&token=' + encodeURIComponent(token)), {
                        method: 'GET',
                        credentials: 'include'
                    });
                    const json = await response.json().catch(function () { return null; });
                    if (!json || json.success !== true || json.valid !== true) {
                        throw new Error((json && json.message) || 'Token invalido ou expirado');
                    }
                } catch (err) {
                    setMessage(err.message || 'Token invalido ou expirado', 'err');
                    form.querySelectorAll('input,button').forEach(function (el) { el.disabled = true; });
                }
            }

            form.addEventListener('submit', async function (event) {
                event.preventDefault();
                setMessage('', 'ok');

                const p1 = document.getElementById('newPassword').value;
                const p2 = document.getElementById('confirmPassword').value;
                if (p1.length < 6) {
                    setMessage('A senha deve ter pelo menos 6 caracteres.', 'err');
                    return;
                }
                if (p1 !== p2) {
                    setMessage('As senhas nao conferem.', 'err');
                    return;
                }

                submitBtn.disabled = true;
                try {
                    const formData = new URLSearchParams();
                    formData.append('action', 'reset_password');
                    formData.append('token', token);
                    formData.append('new_password', p1);

                    const response = await fetch(getApiUrl('auth/login.php'), {
                        method: 'POST',
                        credentials: 'include',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formData.toString()
                    });
                    const json = await response.json().catch(function () { return null; });
                    if (!json || json.success !== true) {
                        throw new Error((json && json.message) || 'Falha ao redefinir senha');
                    }

                    setMessage('Senha redefinida com sucesso. Voce pode entrar agora.', 'ok');
                    setTimeout(function () { window.location.href = './login.html'; }, 1200);
                } catch (err) {
                    setMessage(err.message || 'Falha ao redefinir senha.', 'err');
                } finally {
                    submitBtn.disabled = false;
                }
            });

            validateToken();
        })();
    </script>
</body>
</html>
